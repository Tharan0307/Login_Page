<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · Verdant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #10201A;
    --surface: #17281F;
    --surface-raised: #1D3126;
    --line: #2B4436;
    --text: #EAF0EA;
    --text-muted: #9FB3A6;
    --gold: #C9A24B;
    --gold-soft: rgba(201, 162, 75, 0.14);
    --sage: #6E9179;
    --error: #E08770;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .layout {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
  }

  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
    .art-panel { display: none; }
  }

  /* ---------- Left: illustrated panel ---------- */
  .art-panel {
    position: relative;
    background: radial-gradient(120% 100% at 20% 0%, #1A2F23 0%, #10201A 60%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px;
    overflow: hidden;
    border-right: 1px solid var(--line);
  }

  .art-panel svg.vine {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .vine-path {
    fill: none;
    stroke: var(--sage);
    stroke-width: 1.4;
    stroke-linecap: round;
    opacity: 0.55;
    stroke-dasharray: 2400;
    stroke-dashoffset: 2400;
    animation: draw 3.2s ease-out forwards;
  }

  .vine-leaf {
    fill: var(--sage);
    opacity: 0;
    animation: fadeLeaf 0.6s ease-out forwards;
  }

  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  @keyframes fadeLeaf {
    to { opacity: 0.65; }
  }

  .brand {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.4px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 17px;
    color: var(--gold);
  }

  .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-size: 15px;
    color: var(--text);
  }

  .art-copy {
    position: relative;
    z-index: 2;
    max-width: 380px;
  }

  .art-copy .eyebrow {
    font-size: 13px;
    color: var(--sage);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .art-copy h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 34px;
    line-height: 1.25;
    margin: 0 0 14px 0;
  }

  .art-copy h1 em {
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }

  .art-copy p {
    color: var(--text-muted);
    font-size: 14.5px;
    line-height: 1.6;
    margin: 0;
  }

  /* ---------- Right: form panel ---------- */
  .form-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .form-wrap {
    width: 100%;
    max-width: 380px;
  }

  .form-header {
    margin-bottom: 32px;
  }

  .form-header h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 28px;
    margin: 0 0 8px 0;
  }

  .form-header p {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0;
  }

  .form-header p a {
    color: var(--gold);
    text-decoration: none;
  }
  .form-header p a:hover { text-decoration: underline; }

  form { display: flex; flex-direction: column; gap: 18px; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .input-shell {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .input-shell:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-soft);
  }

  .input-shell input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    min-width: 0;
  }

  .input-shell input::placeholder { color: #5E7568; }

  .toggle-visibility {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12.5px;
    font-family: 'Inter', sans-serif;
    padding: 0 14px;
    white-space: nowrap;
  }
  .toggle-visibility:hover { color: var(--gold); }

  .field.error .input-shell {
    border-color: var(--error);
  }

  .error-text {
    font-size: 12.5px;
    color: var(--error);
    min-height: 16px;
  }

  .row-between {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13.5px;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
  }

  .checkbox-row input {
    accent-color: var(--gold);
    width: 15px;
    height: 15px;
  }

  .row-between a {
    color: var(--gold);
    text-decoration: none;
  }
  .row-between a:hover { text-decoration: underline; }

  .submit-btn {
    margin-top: 4px;
    background: var(--gold);
    color: #17251C;
    border: none;
    border-radius: var(--radius);
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.05s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { filter: brightness(1.08); }
  .submit-btn:active { transform: translateY(1px); }
  .submit-btn:focus-visible,
  a:focus-visible,
  input:focus-visible,
  button:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .submit-btn[disabled] {
    opacity: 0.7;
    cursor: default;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(23, 37, 28, 0.35);
    border-top-color: #17251C;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .submit-btn.loading .spinner { display: inline-block; }
  .submit-btn.loading .btn-label { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 12px;
    margin: 6px 0;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .alt-actions {
    display: flex;
    gap: 12px;
  }

  .alt-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    padding: 10px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .alt-btn:hover { border-color: var(--sage); background: var(--surface-raised); }

  .footer-note {
    margin-top: 26px;
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
  }
  .footer-note a { color: var(--gold); text-decoration: none; }
  .footer-note a:hover { text-decoration: underline; }

  .status-banner {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--surface-raised);
    border: 1px solid var(--sage);
    color: var(--text);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 13.5px;
    margin-bottom: 4px;
  }
  .status-banner.show { display: flex; }
</style>
</head>
<body>
<div class="layout">

  <!-- Left illustrated panel -->
  <div class="art-panel" aria-hidden="true">
    <svg class="vine" viewBox="0 0 500 800" preserveAspectRatio="none">
      <path class="vine-path" d="M 40 800 C 40 650, 140 620, 120 500 C 100 380, 20 360, 40 240 C 60 120, 160 100, 150 20"/>
      <circle class="vine-leaf" style="animation-delay:1.1s" cx="118" cy="500" r="6"/>
      <circle class="vine-leaf" style="animation-delay:1.6s" cx="42" cy="240" r="5"/>
      <circle class="vine-leaf" style="animation-delay:2.2s" cx="150" cy="60" r="6"/>
      <circle class="vine-leaf" style="animation-delay:2.6s" cx="80" cy="700" r="4.5"/>
    </svg>

    <div class="brand">
      <div class="brand-mark">V</div>
      <div class="brand-name">Verdant</div>
    </div>

    <div class="art-copy">
      <div class="eyebrow">Welcome back</div>
      <h1>Pick up right where <em>you</em> left off.</h1>
      <p>Your projects, notes, and saved work are exactly where you left them. Sign in to continue.</p>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="form-panel">
    <div class="form-wrap">

      <div class="form-header">
        <h2>Sign in</h2>
        <p>New here? <a href="#" id="signupLink">Create an account</a></p>
      </div>

      <div class="status-banner" id="statusBanner" role="status"></div>

      <form id="loginForm" novalidate>
        <div class="field" id="emailField">
          <label for="email">Email</label>
          <div class="input-shell">
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="username" required />
          </div>
          <div class="error-text" id="emailError"></div>
        </div>

        <div class="field" id="passwordField">
          <label for="password">Password</label>
          <div class="input-shell">
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="toggle-visibility" id="togglePassword" aria-label="Show password">Show</button>
          </div>
          <div class="error-text" id="passwordError"></div>
        </div>

        <div class="row-between">
          <label class="checkbox-row">
            <input type="checkbox" id="remember" name="remember" />
            Remember me
          </label>
          <a href="#" id="forgotLink">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-label">Sign in</span>
          <span class="spinner"></span>
        </button>

        <div class="divider">or continue with</div>

        <div class="alt-actions">
          <button type="button" class="alt-btn" id="googleBtn">Google</button>
          <button type="button" class="alt-btn" id="githubBtn">GitHub</button>
        </div>
      </form>

      <div class="footer-note">
        By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
      </div>

    </div>
  </div>

</div>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const emailField = document.getElementById('emailField');
  const passwordField = document.getElementById('passwordField');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');
  const submitBtn = document.getElementById('submitBtn');
  const togglePassword = document.getElementById('togglePassword');
  const statusBanner = document.getElementById('statusBanner');

  function showBanner(message) {
    statusBanner.textContent = message;
    statusBanner.classList.add('show');
  }

  function setError(field, errorEl, message) {
    if (message) {
      field.classList.add('error');
      errorEl.textContent = message;
    } else {
      field.classList.remove('error');
      errorEl.textContent = '';
    }
  }

  function isValidEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
  }

  togglePassword.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    togglePassword.textContent = isPassword ? 'Hide' : 'Show';
    togglePassword.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusBanner.classList.remove('show');

    let hasError = false;

    if (!emailInput.value.trim()) {
      setError(emailField, emailError, 'Enter your email to continue.');
      hasError = true;
    } else if (!isValidEmail(emailInput.value.trim())) {
      setError(emailField, emailError, "That email doesn't look right.");
      hasError = true;
    } else {
      setError(emailField, emailError, '');
    }

    if (!passwordInput.value) {
      setError(passwordField, passwordError, 'Enter your password to continue.');
      hasError = true;
    } else {
      setError(passwordField, passwordError, '');
    }

    if (hasError) return;

    // Demo submit flow — replace this block with a real API call.
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    try {
      // Example of wiring to a real backend:
      // const res = await fetch('/api/login', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({
      //     email: emailInput.value.trim(),
      //     password: passwordInput.value,
      //     remember: document.getElementById('remember').checked
      //   })
      // });
      // if (!res.ok) throw new Error('Invalid credentials');

      await new Promise((resolve) => setTimeout(resolve, 1100));
      showBanner('Signed in successfully. Redirecting…');
    } catch (err) {
      setError(passwordField, passwordError, 'Incorrect email or password.');
    } finally {
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }
  });

  document.getElementById('googleBtn').addEventListener('click', () => {
    showBanner('Google sign-in isn\u2019t wired up yet — connect it to your OAuth flow.');
  });
  document.getElementById('githubBtn').addEventListener('click', () => {
    showBanner('GitHub sign-in isn\u2019t wired up yet — connect it to your OAuth flow.');
  });
  document.getElementById('forgotLink').addEventListener('click', (e) => {
    e.preventDefault();
    showBanner('Password reset flow goes here.');
  });
  document.getElementById('signupLink').addEventListener('click', (e) => {
    e.preventDefault();
    showBanner('Link this to your sign-up page.');
  });
</script>
</body>
</html>
